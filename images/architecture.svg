<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cbd5e1"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="960" height="540" fill="#0b1120"/>

  <text x="480" y="40" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">tinybus</text>
  <text x="480" y="60" text-anchor="middle" fill="#94a3b8" font-size="12">a Postgres-backed job queue. one table, three partial indexes, no broker.</text>

  <!-- Producers -->
  <g>
    <rect x="50" y="120" width="170" height="80" rx="10" fill="#1e293b" stroke="#475569"/>
    <text x="135" y="148" text-anchor="middle" fill="#e2e8f0" font-weight="600">producer 1..N</text>
    <text x="135" y="170" text-anchor="middle" fill="#94a3b8" font-size="12">tinybus enqueue</text>
    <text x="135" y="186" text-anchor="middle" fill="#94a3b8" font-size="12">q.Enqueue(ctx, ...)</text>
  </g>

  <!-- jobs table -->
  <g>
    <rect x="370" y="200" width="220" height="140" rx="10" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <text x="480" y="228" text-anchor="middle" fill="#38bdf8" font-weight="700">jobs (Postgres)</text>
    <text x="480" y="250" text-anchor="middle" fill="#94a3b8" font-size="11">id, queue, payload, attempts</text>
    <text x="480" y="266" text-anchor="middle" fill="#94a3b8" font-size="11">run_at, locked_at, locked_by</text>
    <text x="480" y="282" text-anchor="middle" fill="#94a3b8" font-size="11">dead_at, last_error</text>
    <text x="480" y="312" text-anchor="middle" fill="#fbbf24" font-size="11" font-style="italic">+3 partial indexes</text>
  </g>

  <!-- Workers -->
  <g>
    <rect x="740" y="120" width="170" height="80" rx="10" fill="#1e293b" stroke="#475569"/>
    <text x="825" y="148" text-anchor="middle" fill="#e2e8f0" font-weight="600">worker 1..N</text>
    <text x="825" y="170" text-anchor="middle" fill="#94a3b8" font-size="12">tinybus worker</text>
    <text x="825" y="186" text-anchor="middle" fill="#94a3b8" font-size="12">q.Process(ctx, q, fn)</text>
  </g>

  <!-- Sweeper -->
  <g>
    <rect x="740" y="340" width="170" height="80" rx="10" fill="#1e293b" stroke="#475569"/>
    <text x="825" y="368" text-anchor="middle" fill="#e2e8f0" font-weight="600">sweeper</text>
    <text x="825" y="390" text-anchor="middle" fill="#94a3b8" font-size="12">lock-expiry reclaim</text>
    <text x="825" y="406" text-anchor="middle" fill="#94a3b8" font-size="12">every lease/2</text>
  </g>

  <!-- Producer arrow -->
  <line x1="220" y1="160" x2="370" y2="240" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="295" y="195" text-anchor="middle" fill="#cbd5e1" font-size="11">INSERT …</text>
  <text x="295" y="210" text-anchor="middle" fill="#cbd5e1" font-size="11">RETURNING id</text>

  <!-- Worker claim arrow -->
  <line x1="740" y1="160" x2="590" y2="240" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <text x="665" y="195" text-anchor="middle" fill="#34d399" font-size="11">UPDATE … RETURNING</text>
  <text x="665" y="210" text-anchor="middle" fill="#34d399" font-size="11">FOR UPDATE SKIP LOCKED</text>

  <!-- Sweeper arrow -->
  <line x1="740" y1="380" x2="590" y2="320" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="665" y="358" text-anchor="middle" fill="#fbbf24" font-size="11">UPDATE locked_at = NULL</text>
  <text x="665" y="373" text-anchor="middle" fill="#fbbf24" font-size="11">WHERE locked_at &lt; now() - lease</text>

  <!-- Footer note -->
  <g>
    <text x="480" y="470" text-anchor="middle" fill="#94a3b8" font-size="12">
      <tspan font-weight="700" fill="#e2e8f0">why this works:</tspan>
      <tspan>SKIP LOCKED gives one row to one worker without serializing the pool.</tspan>
    </text>
    <text x="480" y="492" text-anchor="middle" fill="#94a3b8" font-size="12">
      A crashed worker leaves a stuck `locked_at` — the sweeper reclaims it after the lease.
    </text>
    <text x="480" y="514" text-anchor="middle" fill="#94a3b8" font-size="12">
      No broker. No Redis. One table. One round-trip per claim.
    </text>
  </g>
</svg>
